<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Todo CRUD App</title>

      <style>
            body {
                  font-family: Arial, sans-serif;
                  padding: 30px;
            }

            h1 {
                  margin-bottom: 20px;
            }

            input {
                  padding: 10px;
                  width: 250px;
            }

            button {
                  padding: 8px 12px;
                  margin-left: 5px;
                  cursor: pointer;
            }

            li {
                  margin-top: 15px;
            }

            .edit-btn {
                  margin-left: 10px;
            }

            .delete-btn {
                  margin-left: 5px;
            }
      </style>
</head>

<body>

      <h1>Todo App</h1>

      <input id="todoInput" type="text" placeholder="Enter todo here" />
      <button id="addBtn">Add Todo</button>

      <ul id="todoList"></ul>

      <script src="index.js"></script>
</body>

</html>
